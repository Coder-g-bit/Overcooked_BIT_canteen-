<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dormitary</title>
    <script src="../js/audio.js"></script>
    <style>
        body {
            background-color: wheat;
        }

        #overlay {
            display: none;
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1;
        }

        .game-box {
            position: fixed;
            width: 1000px;
            height: 600px;
            background-color: transparent;
            background-position: center;
            background-size: 100%;
            background-repeat: no-repeat;
            background-image: url(../assets/elements_img/dormitary_background.png);
            top: 10px;
            left: 400px;
        }

        .game-box>.bed-box {
            width: 300px;
            height: 150px;
            background-color: transparent;
            background-position: center;
            background-size: 100%;
            background-repeat: no-repeat;
            background-image: url(../assets/elements_img/bed.png);
            position: absolute;
        }

        #bed-1 {
            right: 240px;
        }

        #bed-2 {
            bottom: 0;
        }

        #bed-3 {
            bottom: 0;
            right: 240px;
        }

        #exit-door {
            width: 50px;
            height: 150px;
            background-color: transparent;
            background-image: url(../assets/elements_img/dormitary_door.png);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: absolute;
            top: 225px;
            box-shadow: 0 0 15px 5px #f1c40f;
        }

        #press-tip {
            width: 100px;
            height: 70px;
            position: absolute;
            top: 200px;
            left: 40px;
            text-align: center;
            background-position: center;
            background-size: 105%;
            background-repeat: no-repeat;
            background-image: url(../assets/elements_img/dialog_box.png);
        }

        #Player {
            background-color: transparent;
            background-image: url(../assets/img/player.png);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            bottom: 25px;
            right: 45px;
            width: 120px;
            height: 120px;
            transition: transform 0.2s ease;
            border-radius: 100%;
            position: absolute;
            z-index: 3;
        }

        #NPC {
            background-image: url(../assets/elements_img/npc_0.png);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            top: 125px;
            right: 75px;
            width: 120px;
            height: 120px;
            border-radius: 100%;
            position: absolute;
            z-index: 2;
            box-shadow: 0 0 15px 5px #f1c40f;
        }

        #interact-tip {
            width: 100px;
            height: 70px;
            position: absolute;
            top: 80px;
            right: 0;
            text-align: center;
            background-position: center;
            background-size: 105%;
            background-repeat: no-repeat;
            background-image: url(../assets/elements_img/dialog_box.png);
        }

        #dialog {
            width: 600px;
            height: 200px;
            line-height: 60px;
            text-align: center;
            font-size: 18px;
            position: absolute;
            background-color: transparent;
            background-position: center;
            background-size: 45%;
            background-repeat: no-repeat;
            background-image: url(../assets/elements_img/dialog_box.png);
            display: none;
            bottom: 200px;
            right: 0;
        }

        #npc-dialog {
            display: none;
            width: 700px;
            height: 200px;
            background-color: white;
            position: absolute;
            bottom: 50px;
            left: 500px;
            background-position: center;
            background-size: 145%;
            background-repeat: no-repeat;
            background-image: url(../assets/elements_img/choice_box_background.png);
        }

        #npc-img {
            width: 180px;
            height: 180px;
            border-radius: 100%;
            background-position: center;
            background-size: 145%;
            background-repeat: no-repeat;
            background-image: url(../assets/elements_img/npc_0.png);
            margin: 10px;
            float: left;
        }

        #npc-text {
            width: 450px;
            height: 180px;
            background-color: yellow;
            margin: 10px;
            float: left;
            text-align: center;
            line-height: 40px;
            font-size: 25px;
            background-position: center;
            background-size: 145%;
            background-repeat: no-repeat;
            background-image: url(../assets/elements_img/show_ach.png);
        }
    </style>
</head>

<body>
    <div class="overlay-box" id="overlay"></div>
    <div class="game-box">
        <div class="player" id="Player"></div>
        <div class="npc" id="NPC"></div>
        <div class="interact-tip-box" id="interact-tip">Press 'Space' to interact</div>
        <div class="bed-box" id="bed-0"></div>
        <div class="bed-box" id="bed-1"></div>
        <div class="bed-box" id="bed-2"></div>
        <div class="bed-box" id="bed-3"></div>
        <div class="exit-door-box" id="exit-door">
            <audio src="../assets/MP3/open_door.mp3" id="door-open-sound"></audio>
        </div>
        <div class="press-tip-box" id="press-tip">Press 'e' to leave here</div>
    </div>
    <div class="dialog-box" id="dialog">饿鼠了~~~<br>今天已经是学校禁止点外卖的<br>第14.514天了</div>
    <div class="npc-dialog-box" id="npc-dialog">
        <div class="npc-img-box" id="npc-img"></div>
        <div class="npc-text-box" id="npc-text">鼠鼠，你终于醒了！<br>现在食堂已经被饥饿的师生鼠们攻占了<br>可是没有鼠为鼠们做饭了<br>好饿~</div>
    </div>
    <audio src="../assets/MP3/walking.mp3" id="walking-sound"></audio>
    <audio src="../assets/MP3/squeaking.mp3" id="speaking-sound"></audio>
    <audio src="../assets/MP3/game_bgm.mp3" id="game_bgm"></audio>
    <button id="menuButton" class="menu-button" onclick="toggleMenu()" title="menuButton"></button>
    <div id="menuPanel" class="menu-panel">
        <button id="saveButton" onclick="save()"></button>
        <button id="quitButton" onclick="goHome()"></button>
        <button id="resumeButton" onclick="toggleMenu()"></button>
    </div>
    <div id="overlay" class="overlay"></div>
    <link rel="stylesheet" href="../assets/style/menu.css">
    <script src="../js/save.js"></script>
</body>

</html>

<script>
    const keys = {};
    const Player = document.getElementById('Player');
    const playerR = 60;
    const Overlay = document.getElementById('overlay');
    const Dialog = document.getElementById('dialog');
    const NPCDialog = document.getElementById('npc-dialog')
    const ConstSpeed = 3;
    let speed = 0;
    let posX = 525;
    let posY = 470;

    

    function WindowBlink() {//待完善
        setTimeout(function () { Overlay.style.display = 'block'; }, 700);
        setTimeout(function () { Overlay.style.display = 'none'; }, 1400);
    }

    WindowBlink();
    setTimeout(() => {
        WindowBlink();
        for(let i = 0;i < 4; ++i){
            localStorage.setItem('vis'+ i,'0');
        }
        playAudio('game_bgm');
        volumeDown('game_bgm',0.1);
    }, 1500);
    Dialog.style.display = 'block';
    setTimeout(() => { Dialog.innerHTML = "好想吃美味的<br>MiceDonald's和白梨烤鸭"; playAudio("speaking-sound"); }, 2000);
    setTimeout(() => { Dialog.style.display = 'none'; speed = 3; }, 4000);
    window.addEventListener('keydown', (e) => {
        if (e.key == 'e' && posX <= 100 && posY >= 200) {
            playAudio("door-open-sound");
            setTimeout(() => { window.location.href = "game.html"; }, 1000);
            localStorage.removeItem('posXinGame');
            localStorage.removeItem('posYinGame');
        }
        if (e.key == ' ' && posX > 690 && posY < 250) {//npc
            localStorage.setItem('vis0','1');
            NPCDialog.style.display = 'block';
            speed = 0;
            document.getElementById('NPC').style.boxShadow = 'none';
            playAudio("speaking-sound");
            setTimeout(function () {
                speed = ConstSpeed;
                playAudio("speaking-sound");
                NPCDialog.style.display = 'none';
            }, 3000);
        }
        keys[e.key] = true;
    });

    window.addEventListener('keyup', (e) => {
        keys[e.key] = false;
    });

    function GameLoop() {
        if ((keys['w'] || keys['a'] || keys['s'] || keys['d']) && speed) {
            playAudio("walking-sound");
        }
        if (keys['w'] && keys['a']) {
            posY -= speed;
            posX -= speed;
            Player.style.transform = 'rotate(-45deg)';
        } else if (keys['w'] && keys['d']) {
            posY -= speed;
            posX += speed;
            Player.style.transform = 'rotate(45deg)';
        } else if (keys['s'] && keys['a']) {
            posY += speed;
            posX -= speed;
            Player.style.transform = 'rotate(-135deg)';
        } else if (keys['s'] && keys['d']) {
            posY += speed;
            posX += speed;
            Player.style.transform = 'rotate(135deg)';
        } else if (keys['w']) {
            posY -= speed;
            Player.style.transform = 'rotate(0deg)';
        } else if (keys['a']) {
            posX -= speed;
            Player.style.transform = 'rotate(-90deg)';
        } else if (keys['s']) {
            posY += speed;
            Player.style.transform = 'rotate(180deg)';
        } else if (keys['d']) {
            posX += speed;
            Player.style.transform = 'rotate(90deg)';
        } else {
            Player.style.transform = 'rotate(0deg)';
        }

        CheckBlock(0, 0, 300, 150);
        CheckBlock(460, 0, 300, 150);
        CheckBlock(0, 450, 300, 150);
        CheckBlock(460, 450, 300, 150);
        posX = Math.max(0, Math.min(880, posX));
        posY = Math.max(0, Math.min(480, posY));
        //console.log(posX, posY);
        Player.style.left = posX + 'px';
        Player.style.top = posY + 'px';
        requestAnimationFrame(GameLoop);
    }

    function CheckBlock(x, y, w, h) {
        let Left = x;
        let Bottom = y + h;
        let Right = x + w;
        let Top = y;
        let middleX = posX + playerR;
        let middleY = posY + playerR;
        let err = speed;
        if (Left <= middleX && middleX <= Right && middleY + playerR <= Top + err) posY = Math.min(Top - 2 * playerR, posY);
        if (Left <= middleX && middleX <= Right && posY >= Bottom - err) posY = Math.max(Bottom, posY);
        if (Top <= middleY && middleY <= Bottom && middleX + playerR <= Left + err) posX = Math.min(Left - 2 * playerR, posX);
        if (Top <= middleY && middleY <= Bottom && posX >= Right - err) posX = Math.max(Right, posX);
        if ((middleX - Left) * (middleX - Left) + (middleY - Top) * (middleY - Top) <= playerR * playerR - err) posX -= err, posY -= err;
        if ((middleX - Left) * (middleX - Left) + (middleY - Bottom) * (middleY - Bottom) <= playerR * playerR - err) posX -= err, posY += err;
        if ((middleX - Right) * (middleX - Right) + (middleY - Top) * (middleY - Top) <= playerR * playerR - err) posX += err, posY -= err;
        if ((middleX - Right) * (middleX - Right) + (middleY - Bottom) * (middleY - Bottom) <= playerR * playerR - err) posX += err, posY += err;
    }

    GameLoop();
</script>
