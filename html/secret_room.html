<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Room</title>
    <link rel="stylesheet" href="../assets/style/store.css">
    <script src="../js/audio.js"></script>
    <script src="../js/save.js"></script>
    <script src="../js/achievement.js"></script>
    
    <style>
        .game-box {
            position: fixed;
            width: 1000px;
            height: 600px;
            background-color: bisque;
            top: 10px;
            left: 400px;
            background-image: url(../assets/elements_img/floor.png);
            background-size: 25%;
            background-position: center;
        }

        .game-box .player {
            background-image: url(../assets/img/player.png);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            top: 500px;
            left: 450px;
            width: 100px;
            height: 100px;
            transition: transform 0.2s ease;
            border-radius: 100%;
            position: absolute;
            z-index: 1;
        }

        #dream-hole {
            width: 600px;
            height: 400px;
            position: absolute;
            left: 200px;
            top: 100px;
            background-image: url(../assets/elements_img/wave.png);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            border-radius: 100%;
        }

        #ice-tea {
            /* display: none; */
            width: 200px;
            height: 300px;
            position: absolute;
            left: 200px;
            top: -100px;
            background-image: url(../assets/elements_img/God_Of_Drink.png);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            box-shadow: 0 0 15px 5px #f1c40f;
        }

        #choice {
            display: none;
            width: 500px;
            height: 200px;
            position: absolute;
            background-image: url(../assets/elements_img/secret_choice_background.png);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            left: 50px;
            top: 100px;
        }

        #choice>.price-box {
            width: 116px;
            height: 150px;
            margin: 25px;
            background-size: 50%;
            background-position: center;
            background-repeat: no-repeat;
            float: left;
            box-shadow: 0 0 15px 5px #f1c40f;
            cursor: pointer;
        }

        #dialog{
            /* display: none; */
            width: 600px;
            height: 200px;
            line-height: 70px;
            text-align: center;
            font-size: 18px;
            position: absolute;
            background-color: transparent;
            background-position: center;
            background-size: 45%;
            background-repeat: no-repeat;
            background-image: url(../assets/elements_img/dialog_box.png);
            top: -20px;
            right: 0;
        }
    </style>
</head>

<body>
    <div class="game-box">
        <div class="player" id="Player"></div>
        <div class="dream-hole-box" id="dream-hole">
            <div class="ice-tea-box" id="ice-tea"></div>
            <div class="choice-box" id="choice">
                <div class="price-box" id="gold-price" style="background-image: url(../assets/elements_img/gold_ice_tea.png);" onclick="GoldPrice()"></div>
                <div class="price-box" id="silver-price" style="background-image: url(../assets/elements_img/silver_ice_tea.png);" onclick="SilverPrice()"></div>
                <div class="price-box" id="bronze-price" style="background-image: url(../assets/elements_img/bronze_ice_tea.png);" onclick="BronzePrice()"></div>
            </div>
        </div>
        <div class="dialog-box" id="dialog">鼠鼠，快醒醒···<br>对喽，快过来</div>
    </div>
    <canvas id="inventory"></canvas>
    <script src="../js/inventory.js"></script>
    <button id="menuButton" class="menu-button" onclick="toggleMenu()" title="menuButton"></button>
    <div id="menuPanel" class="menu-panel">
        <button id="saveButton" onclick="save()"></button>
        <button id="quitButton" onclick="goHome()"></button>
        <button id="resumeButton" onclick="toggleMenu()"></button>
    </div>

    <div id="overlay" class="overlay"></div>
    <link rel="stylesheet" href="../assets/style/menu.css">
</body>

</html>

<script>
    const keys = {};
    const Player = document.getElementById('Player');
    const Dialog = document.getElementById('dialog');
    const ChoiceBox = document.getElementById('choice');
    const God = document.getElementById('ice-tea');
    const playerR = 25;
    const ConstSpeed = 2;
    let speed = 2;
    let posX = 450;
    let posY = 500;

    if(AchievementManager.getAc()[7] == 0)AchievementManager.newAc(7);

    window.addEventListener('keydown', (e) => {
        keys[e.key] = true;
        if(e.key == ' ' && posY < 470 && 320 < posX && posX < 600){
            Dialog.style.lineHeight = '40px';
            Dialog.innerText = '诚实的鼠鼠，\n你掉的是哪个冰红茶呀？\n是金的、银的，还是铜的\n(请点击其中一个冰红茶)';
            ChoiceBox.style.display = 'block';
            God.style.boxShadow = 'none';
            posY = 500;
        }
    });

    window.addEventListener('keyup', (e) => {
        keys[e.key] = false;
    });

    function GoldPrice(){
        alert('+1000 Mice-Crisp!');
        ChoiceBox.style.display = 'none';
        Dialog.innerText = "你这只贪婪却精明的老鼠！"
        Dialog.style.lineHeight = '200px';
        CoinManager.addCoin(1000);
        setTimeout(BackToEastCanteen,3000);
    }

    function SilverPrice(){
        ChoiceBox.style.display = 'none';
        Dialog.innerText = "不够诚实，也不够贪婪————回去吧！"
        Dialog.style.lineHeight = '200px';
        setTimeout(BackToEastCanteen,3000);
    }

    function BronzePrice(){
        ChoiceBox.style.display = 'none';
        Dialog.innerText = "作为一只鼠，要诚实做什么？"
        Dialog.style.lineHeight = '200px';
        setTimeout(BackToEastCanteen,3000);
    }

    function BackToEastCanteen(){
        window.location.href = "eastcanteen.html";
    }

    function GameLoop() {
        if ((keys['w'] || keys['a'] || keys['s'] || keys['d']) && speed) {
            
            //playAudio("walking-sound");
        }
        if (keys['w'] && keys['a']) {
            posY -= speed;
            posX -= speed;
            Player.style.transform = 'rotate(-45deg)';
        } else if (keys['w'] && keys['d']) {
            posY -= speed;
            posX += speed;
            Player.style.transform = 'rotate(45deg)';
        } else if (keys['s'] && keys['a']) {
            posY += speed;
            posX -= speed;
            Player.style.transform = 'rotate(-135deg)';
        } else if (keys['s'] && keys['d']) {
            posY += speed;
            posX += speed;
            Player.style.transform = 'rotate(135deg)';
        } else if (keys['w']) {
            posY -= speed;
            Player.style.transform = 'rotate(0deg)';
        } else if (keys['a']) {
            posX -= speed;
            Player.style.transform = 'rotate(-90deg)';
        } else if (keys['s']) {
            posY += speed;
            Player.style.transform = 'rotate(180deg)';
        } else if (keys['d']) {
            posX += speed;
            Player.style.transform = 'rotate(90deg)';
        } else {
            Player.style.transform = 'rotate(0deg)';
        }
        //console.log(posX, posY)
        posX = Math.max(0, Math.min(900, posX));
        posY = Math.max(0, Math.min(500, posY));
        Player.style.left = posX + 'px';
        Player.style.top = posY + 'px';
        requestAnimationFrame(GameLoop);
    }

    GameLoop();
</script>
